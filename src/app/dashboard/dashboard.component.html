<div class="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow p-8 w-full max-w-md text-center">

    <!-- Role badge(s) -->
    <div class="mb-4 flex justify-center flex-wrap gap-2">
      @for (role of (auth.currentUser()?.roles ?? []); track role.id) {
        <span class="text-xs font-semibold px-3 py-1 rounded-full uppercase tracking-wide bg-indigo-100 text-indigo-700">
          {{ role.name }}
        </span>
      }
      @if (!(auth.currentUser()?.roles?.length)) {
        <span class="text-xs font-semibold px-3 py-1 rounded-full uppercase tracking-wide bg-gray-100 text-gray-400">
          No Role
        </span>
      }
    </div>

    <h1 class="text-2xl font-bold text-gray-900 mb-2">Welcome! 🎉</h1>
    <p class="text-gray-500 text-sm mb-6">
      Signed in as <strong>{{ auth.currentUser()?.email }}</strong>
    </p>

    <!-- Admin panel button (only for SUPER_ADMIN / ADMIN) -->
    @if (isAdmin()) {
      <button
        (click)="goToAdmin()"
        class="w-full mb-3 py-2.5 px-4 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-xl transition-colors cursor-pointer"
      >
        User Management Panel
      </button>
    }

    <button
      (click)="logout()"
      class="w-full py-2.5 px-4 bg-red-50 text-red-700 hover:bg-red-100 rounded-xl text-sm font-medium transition-colors cursor-pointer"
    >
      Sign out
    </button>
  </div>
</div>

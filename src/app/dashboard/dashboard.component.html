<div class="min-h-screen bg-zinc-50 flex flex-col items-center justify-center p-4">
  <div class="shad-card p-6 w-full max-w-sm">

    <!-- Avatar & identity -->
    <div class="flex flex-col items-center text-center mb-5">
      <div class="w-12 h-12 rounded-full bg-zinc-900 flex items-center justify-center text-white text-lg font-semibold mb-3 uppercase">
        {{ (auth.currentUser()?.email ?? '?')[0] }}
      </div>
      <p class="text-xs text-zinc-500 mt-0.5">{{ auth.currentUser()?.email }}</p>
    </div>

    <!-- Role badges -->
    <div class="flex flex-wrap justify-center gap-1.5 mb-5">
      @for (role of (auth.currentUser()?.roles ?? []); track role.id) {
        <span class="shad-badge-secondary uppercase tracking-wide text-[11px]">{{ role.name }}</span>
      }
      @if (!(auth.currentUser()?.roles?.length)) {
        <span class="shad-badge-outline text-[11px]">No role assigned</span>
      }
    </div>

    <!-- Separator -->
    <div class="border-t border-zinc-100 mb-5"></div>

    <!-- Actions -->
    <div class="flex flex-col gap-2">
      @if (isAdmin()) {
        <button (click)="goToAdmin()" class="shad-btn-primary w-full">
          <i class="fa-solid fa-gear mr-2"></i>
          Admin Panel
        </button>
      }
      <button (click)="logout()" class="shad-btn-outline w-full text-red-600 hover:text-red-700 hover:bg-red-50 border-red-200">
        <i class="fa-solid fa-right-from-bracket mr-2"></i>
        Sign out
      </button>
    </div>

  </div>
</div>

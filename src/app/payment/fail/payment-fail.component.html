<div class="min-h-screen bg-zinc-50 flex items-center justify-center px-4 py-16">
  <div class="bg-white rounded-2xl border border-red-200 shadow-sm px-8 py-12 max-w-md w-full flex flex-col items-center text-center gap-5">
    <div class="w-20 h-20 rounded-full bg-red-100 border-2 border-red-300 flex items-center justify-center">
      <i class="fa-solid fa-circle-xmark text-4xl text-red-500"></i>
    </div>
    <div>
      <h1 class="text-2xl font-bold text-zinc-900">Payment Failed</h1>
      <p class="text-sm text-zinc-500 mt-2">
        Your payment was not completed. This could be due to a cancellation, timeout, or
        a declined transaction. No charge has been made.
      </p>
    </div>
    <div class="flex flex-col sm:flex-row gap-3 mt-2 w-full">
      <a
        routerLink="/donations"
        class="flex-1 inline-flex items-center justify-center gap-2 border border-zinc-200 text-zinc-600 hover:bg-zinc-50 text-sm font-medium px-5 py-2.5 rounded-lg transition-colors"
      >
        <i class="fa-solid fa-arrow-left text-xs"></i>
        Back to Donations
      </a>
      <a
        [routerLink]="invoiceId ? '/payment' : '/donations'"
        [queryParams]="invoiceId ? { invoiceId } : {}"
        class="flex-1 inline-flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold px-5 py-2.5 rounded-lg transition-colors"
      >
        <i class="fa-solid fa-rotate-right text-xs"></i>
        Try Again
      </a>
    </div>
    <p class="text-xs text-zinc-400 flex items-center gap-1.5">
      <i class="fa-solid fa-circle-info text-zinc-300"></i>
      If you believe this is an error, please
      <a routerLink="/contact" class="underline hover:text-zinc-600 ml-1">contact us</a>.
    </p>
  </div>
</div>

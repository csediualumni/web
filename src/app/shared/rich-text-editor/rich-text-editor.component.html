<!-- Label -->
@if (label) {
  <label [for]="inputId + '-editor'" class="block text-sm font-medium text-zinc-700 mb-1">
    {{ label }}
    @if (required) {
      <span class="text-red-500"> *</span>
    }
  </label>
}

<!-- Tab row -->
<div
  class="flex items-center border border-zinc-200 rounded-t-lg overflow-hidden bg-zinc-50 text-xs font-medium"
>
  <button
    type="button"
    (click)="setTab('html')"
    [class.bg-white]="activeTab() === 'html'"
    [class.text-zinc-900]="activeTab() === 'html'"
    [class.text-zinc-500]="activeTab() !== 'html'"
    [class.border-b-2]="activeTab() === 'html'"
    [class.border-b-zinc-900]="activeTab() === 'html'"
    class="px-4 py-2 transition-colors cursor-pointer hover:text-zinc-800 select-none"
  >
    <i class="fa-solid fa-code mr-1.5"></i>HTML
  </button>
  <button
    type="button"
    (click)="setTab('markdown')"
    [class.bg-white]="activeTab() === 'markdown'"
    [class.text-zinc-900]="activeTab() === 'markdown'"
    [class.text-zinc-500]="activeTab() !== 'markdown'"
    [class.border-b-2]="activeTab() === 'markdown'"
    [class.border-b-zinc-900]="activeTab() === 'markdown'"
    class="px-4 py-2 transition-colors cursor-pointer hover:text-zinc-800 select-none"
  >
    <i class="fa-brands fa-markdown mr-1.5"></i>Markdown
  </button>
  <button
    type="button"
    (click)="setTab('preview')"
    [class.bg-white]="activeTab() === 'preview'"
    [class.text-zinc-900]="activeTab() === 'preview'"
    [class.text-zinc-500]="activeTab() !== 'preview'"
    [class.border-b-2]="activeTab() === 'preview'"
    [class.border-b-zinc-900]="activeTab() === 'preview'"
    class="px-4 py-2 transition-colors cursor-pointer hover:text-zinc-800 select-none"
  >
    <i class="fa-solid fa-eye mr-1.5"></i>Preview
  </button>
  <span class="ml-auto px-3 text-zinc-400 text-xs italic">
    {{ format === 'markdown' ? 'Markdown' : 'HTML' }} mode
  </span>
</div>

<!-- Editor area -->
<div class="border border-t-0 border-zinc-200 rounded-b-lg overflow-hidden">
  @if (activeTab() === 'html' || activeTab() === 'markdown') {
    <textarea
      [id]="inputId + '-editor'"
      [rows]="rows"
      [placeholder]="placeholder"
      [value]="content"
      (input)="onContentChange($any($event.target).value)"
      class="w-full px-3 py-2.5 text-sm text-zinc-900 placeholder:text-zinc-400 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-zinc-300 bg-white font-mono resize-y leading-relaxed"
    ></textarea>
  }

  @if (activeTab() === 'preview') {
    <div
      class="px-4 py-4 min-h-[120px] bg-white text-sm prose prose-sm max-w-none prose-headings:font-semibold prose-a:text-blue-600 prose-a:underline overflow-auto"
      [innerHTML]="previewHtml"
    ></div>
    @if (!content.trim()) {
      <p class="px-4 pb-4 text-xs text-zinc-400 italic -mt-2">Nothing to preview yet.</p>
    }
  }
</div>
